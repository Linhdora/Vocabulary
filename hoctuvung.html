<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexiVault — Kho Từ Vựng</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef1f8;
    --border: #dde2f0;
    --accent: #059669;
    --accent2: #4f46e5;
    --accent3: #db2777;
    --text: #1e2235;
    --text2: #64748b;
    --danger: #ef4444;
    --card-radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* SIDEBAR */
  .sidebar {
    position:fixed; left:0; top:0; bottom:0; width:268px;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; z-index:100; padding:24px 0 0;
  }
  .logo { padding:0 20px 20px; border-bottom:1px solid var(--border); }
  .logo h1 {
    font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .logo small { font-size:11px; color:var(--text2); letter-spacing:1.5px; text-transform:uppercase; }
  .nav-section { padding:16px 16px 6px; font-size:10px; color:var(--text2); letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:9px 14px;
    margin:1px 8px; border-radius:10px; cursor:pointer; font-size:13.5px;
    color:var(--text2); transition:all 0.18s; user-select:none;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:rgba(79,70,229,0.1); color:var(--accent2); font-weight:500; }

  /* GROUP LIST */
  .group-list { flex:1; overflow-y:auto; padding-bottom:12px; }
  .group-list::-webkit-scrollbar { width:3px; }
  .group-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .group-parent-row {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px 8px 14px; margin:2px 8px;
    border-radius:10px; cursor:pointer; font-size:13px;
    color:var(--text2); transition:all 0.18s; position:relative;
  }
  .group-parent-row:hover { background:var(--surface2); color:var(--text); }
  .group-parent-row.active { background:rgba(79,70,229,0.08); color:var(--accent2); font-weight:500; }
  .group-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .group-name-text { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .group-count-badge {
    font-size:11px; background:var(--surface2); border-radius:20px;
    padding:1px 7px; flex-shrink:0; color:var(--text2);
  }
  .expand-btn {
    width:20px; height:20px; border-radius:5px; border:none; background:transparent;
    color:var(--text2); cursor:pointer; font-size:10px; display:flex;
    align-items:center; justify-content:center; transition:transform 0.2s; flex-shrink:0;
  }
  .expand-btn:hover { background:var(--border); }
  .expand-btn.open { transform:rotate(90deg); }
  .add-sub-btn {
    width:20px; height:20px; border-radius:5px; border:none; background:transparent;
    color:var(--text2); cursor:pointer; font-size:14px; display:flex;
    align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0;
    opacity:0;
  }
  .group-parent-row:hover .add-sub-btn { opacity:1; }
  .add-sub-btn:hover { background:rgba(79,70,229,0.1); color:var(--accent2); }

  .subgroup-container { overflow:hidden; transition:max-height 0.3s ease; max-height:0; }
  .subgroup-container.open { max-height:600px; }
  .subgroup-row {
    display:flex; align-items:center; gap:8px;
    padding:7px 12px 7px 36px; margin:1px 8px;
    border-radius:8px; cursor:pointer; font-size:12.5px;
    color:var(--text2); transition:all 0.15s; position:relative;
  }
  .subgroup-row::before {
    content:''; position:absolute; left:22px; top:50%;
    width:8px; height:1px; background:var(--border);
  }
  .subgroup-row:hover { background:var(--surface2); color:var(--text); }
  .subgroup-row.active { background:rgba(79,70,229,0.08); color:var(--accent2); font-weight:500; }
  .sub-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .sub-count { font-size:10px; background:var(--surface2); border-radius:20px; padding:1px 6px; margin-left:auto; }
  .del-sub-btn {
    width:18px; height:18px; border-radius:4px; border:none; background:transparent;
    color:transparent; cursor:pointer; font-size:11px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s;
  }
  .subgroup-row:hover .del-sub-btn { color:var(--text2); }
  .del-sub-btn:hover { background:rgba(239,68,68,0.1); color:var(--danger) !important; }

  .sidebar-footer { padding:12px 16px 16px; border-top:1px solid var(--border); }
  .add-group-btn {
    width:100%; padding:9px; background:transparent;
    border:1px dashed var(--border); border-radius:10px;
    color:var(--text2); font-size:13px; cursor:pointer;
    font-family:'DM Sans',sans-serif; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .add-group-btn:hover { border-color:var(--accent2); color:var(--accent2); background:rgba(79,70,229,0.04); }

  /* MAIN */
  .main { margin-left:268px; min-height:100vh; }
  .topbar {
    position:sticky; top:0;
    background:rgba(244,246,251,0.92); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border); padding:14px 32px;
    display:flex; align-items:center; gap:14px; z-index:50;
  }
  .page-title { font-family:'Syne',sans-serif; font-size:19px; font-weight:700; }
  .breadcrumb { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:5px; margin-top:3px; }
  .breadcrumb span { cursor:pointer; transition:color 0.15s; }
  .breadcrumb span:hover { color:var(--accent2); text-decoration:underline; }
  .search-box {
    display:flex; align-items:center; gap:8px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:8px 14px; width:250px; transition:border-color 0.2s; margin-left:auto;
  }
  .search-box:focus-within { border-color:var(--accent2); }
  .search-box input { background:none; border:none; outline:none; color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; width:100%; }
  .search-box input::placeholder { color:var(--text2); }
  .btn-primary {
    display:flex; align-items:center; gap:8px; padding:9px 18px;
    background:linear-gradient(135deg,var(--accent2),#6366f1);
    border:none; border-radius:11px; color:#fff; font-size:13.5px;
    font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif;
    transition:all 0.2s; white-space:nowrap;
  }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(79,70,229,0.28); }

  /* CONTENT */
  .content { padding:28px 32px; }
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--card-radius); padding:18px 22px; position:relative; overflow:hidden;
  }
  .stat-card::after { content:attr(data-icon); position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:36px; opacity:0.07; }
  .stat-label { font-size:11px; color:var(--text2); letter-spacing:0.5px; margin-bottom:6px; text-transform:uppercase; }
  .stat-value {
    font-family:'Syne',sans-serif; font-size:30px; font-weight:800;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  /* SUBGROUPS PANEL */
  .subgroups-section { margin-bottom:28px; }
  .subgroups-section-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; margin-bottom:12px; color:var(--text2); display:flex; align-items:center; gap:8px; }
  .subgroups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; }
  .subgroup-card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px 16px; cursor:pointer; transition:all 0.2s;
    position:relative; display:flex; flex-direction:column; gap:5px;
  }
  .subgroup-card:hover { border-color:var(--accent2); transform:translateY(-2px); box-shadow:0 8px 20px rgba(79,70,229,0.1); }
  .subgroup-card-top { display:flex; align-items:center; gap:8px; }
  .subgroup-card-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .subgroup-card-name { font-weight:600; font-size:13px; }
  .subgroup-card-count { font-size:11.5px; color:var(--text2); }
  .subgroup-card-del {
    position:absolute; top:8px; right:8px; width:22px; height:22px;
    border-radius:6px; border:none; background:transparent;
    color:transparent; cursor:pointer; font-size:11px;
    display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .subgroup-card:hover .subgroup-card-del { color:var(--text2); }
  .subgroup-card-del:hover { background:rgba(239,68,68,0.1); color:var(--danger) !important; }
  .add-subgroup-card {
    background:transparent; border:1.5px dashed var(--border); border-radius:14px;
    padding:14px 16px; cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:13px; color:var(--text2); font-family:'DM Sans',sans-serif; min-height:70px;
  }
  .add-subgroup-card:hover { border-color:var(--accent2); color:var(--accent2); background:rgba(79,70,229,0.03); }

  /* FILTER BAR */
  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .filter-chip {
    padding:5px 13px; border-radius:20px; border:1px solid var(--border);
    background:transparent; color:var(--text2); font-size:12.5px;
    cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.18s;
  }
  .filter-chip:hover { border-color:var(--text2); color:var(--text); }
  .filter-chip.active { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:500; }

  /* VOCAB GRID */
  .vocab-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; }
  .vocab-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--card-radius); overflow:hidden; cursor:pointer;
    transition:all 0.22s; animation:fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .vocab-card:hover { border-color:var(--accent2); transform:translateY(-3px); box-shadow:0 10px 28px rgba(79,70,229,0.1); }
  .vocab-img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--surface2); }
  .vocab-img-placeholder { width:100%; aspect-ratio:16/9; background:linear-gradient(135deg,var(--surface2),var(--border)); display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--text2); }
  .vocab-body { padding:12px 14px; }
  .vocab-word { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:2px; }
  .vocab-phonetic { font-size:11px; color:var(--accent2); margin-bottom:5px; }
  .vocab-meaning { font-size:12.5px; color:var(--text2); line-height:1.5; }
  .vocab-footer { display:flex; align-items:center; gap:6px; padding:9px 14px; border-top:1px solid var(--border); }
  .vocab-group-tag { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:500; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .vocab-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.18s; }
  .vocab-card:hover .vocab-actions { opacity:1; }
  .icon-btn {
    width:26px; height:26px; border-radius:7px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text2); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.15s;
  }
  .icon-btn:hover { border-color:var(--danger); color:var(--danger); }
  .icon-btn.edit:hover { border-color:var(--accent2); color:var(--accent2); }

  .empty-state { text-align:center; padding:70px 20px; color:var(--text2); grid-column:1/-1; }
  .empty-state .emoji { font-size:56px; margin-bottom:14px; }
  .empty-state h3 { font-family:'Syne',sans-serif; font-size:18px; color:var(--text); margin-bottom:6px; }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(30,34,53,0.55);
    backdrop-filter:blur(8px); z-index:200; display:flex;
    align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; width:100%; max-width:500px;
    max-height:90vh; overflow-y:auto; animation:slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal::-webkit-scrollbar { width:3px; }
  .modal::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .modal-header { padding:22px 26px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
  .close-btn {
    width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--text2); cursor:pointer; font-size:14px;
    transition:all 0.15s; display:flex; align-items:center; justify-content:center;
  }
  .close-btn:hover { background:var(--surface2); color:var(--text); }
  .modal-body { padding:22px 26px; }
  .form-group { margin-bottom:18px; }
  .form-label { display:block; font-size:11px; color:var(--text2); letter-spacing:0.5px; text-transform:uppercase; font-weight:600; margin-bottom:7px; }
  .form-input,.form-select,.form-textarea {
    width:100%; padding:10px 13px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:13.5px;
    font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent2); }
  .form-select { cursor:pointer; }
  .form-select option { background:var(--surface); }
  .form-textarea { resize:vertical; min-height:76px; }
  .img-upload-zone {
    border:2px dashed var(--border); border-radius:12px; padding:20px;
    text-align:center; cursor:pointer; transition:all 0.2s;
  }
  .img-upload-zone:hover { border-color:var(--accent2); background:rgba(79,70,229,0.03); }
  .img-upload-zone.drag-over { border-color:var(--accent); }
  .img-upload-zone input { display:none; }
  .upload-preview { width:100%; max-height:160px; object-fit:cover; border-radius:8px; margin-top:10px; display:none; }
  .upload-preview.show { display:block; }
  .color-options { display:flex; gap:8px; flex-wrap:wrap; }
  .color-opt { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.15s; }
  .color-opt:hover { transform:scale(1.15); }
  .color-opt.selected { border-color:var(--text); transform:scale(1.1); }
  .modal-footer { padding:18px 26px 22px; display:flex; gap:10px; justify-content:flex-end; }
  .btn-secondary {
    padding:9px 18px; background:transparent; border:1px solid var(--border);
    border-radius:10px; color:var(--text2); font-size:13.5px; cursor:pointer;
    font-family:'DM Sans',sans-serif; transition:all 0.18s;
  }
  .btn-secondary:hover { border-color:var(--text); color:var(--text); }

  /* DETAIL */
  .detail-view { display:none; }
  .detail-view.show { display:block; }
  .detail-back { display:inline-flex; align-items:center; gap:8px; color:var(--text2); font-size:13.5px; cursor:pointer; margin-bottom:24px; transition:color 0.2s; }
  .detail-back:hover { color:var(--text); }
  .detail-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; max-width:640px; }
  .detail-img { width:100%; max-height:300px; object-fit:cover; display:block; }
  .detail-body { padding:28px 30px; }
  .detail-word { font-family:'Syne',sans-serif; font-size:34px; font-weight:800; letter-spacing:-1px; margin-bottom:5px; }
  .detail-phonetic { font-size:15px; color:var(--accent2); margin-bottom:14px; }
  .detail-meaning { font-size:15px; line-height:1.7; color:var(--text2); margin-bottom:18px; }
  .detail-example { font-size:13.5px; font-style:italic; color:var(--text2); padding:12px 16px; background:var(--surface2); border-radius:10px; border-left:3px solid var(--accent2); }

  /* TOAST */
  .toast-container { position:fixed; bottom:22px; right:22px; z-index:500; display:flex; flex-direction:column; gap:8px; }
  .toast {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:11px 16px; font-size:13px; display:flex; align-items:center; gap:10px;
    animation:slideInR 0.3s ease; min-width:230px; box-shadow:0 6px 20px rgba(0,0,0,0.1);
  }
  @keyframes slideInR { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
  .toast.success { border-left:3px solid var(--accent); }
  .toast.error { border-left:3px solid var(--danger); }
  .toast.info { border-left:3px solid var(--accent2); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <h1>LexiVault</h1>
    <small>Kho Từ Vựng</small>
  </div>
  <div class="nav-section">Menu</div>
  <div class="nav-item active" onclick="showView('all')" id="nav-all"><span>📚</span><span>Tất cả từ</span></div>
  <div class="nav-item" onclick="showView('recent')" id="nav-recent"><span>🕐</span><span>Gần đây</span></div>
  <div class="nav-section">Nhóm của tôi</div>
  <div class="group-list" id="group-list"></div>
  <div class="sidebar-footer">
    <button class="add-group-btn" onclick="openGroupModal()">＋ Thêm nhóm</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="flex:1;min-width:0">
      <div class="page-title" id="page-title">Tất cả từ vựng</div>
      <div class="breadcrumb" id="breadcrumb" style="display:none"></div>
    </div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Tìm từ vựng… (Ctrl+K)" id="search-input" oninput="renderVocabGrid()"/>
    </div>
    <button class="btn-primary" onclick="openAddModal()">＋ Thêm từ mới</button>
  </div>

  <div id="list-view">
    <div class="content">
      <div class="stats-row" id="stats-row">
        <div class="stat-card" data-icon="📖"><div class="stat-label">Tổng từ vựng</div><div class="stat-value" id="stat-total">0</div></div>
        <div class="stat-card" data-icon="🗂️"><div class="stat-label">Số nhóm</div><div class="stat-value" id="stat-groups">0</div></div>
        <div class="stat-card" data-icon="📅"><div class="stat-label">Thêm hôm nay</div><div class="stat-value" id="stat-today">0</div></div>
      </div>

      <!-- Subgroups panel -->
      <div id="subgroups-panel" style="display:none">
        <div class="subgroups-section">
          <div class="subgroups-section-title">📂 Nhóm nhỏ</div>
          <div class="subgroups-grid" id="subgroups-grid"></div>
        </div>
      </div>

      <div class="filter-bar" id="filter-bar"></div>
      <div class="vocab-grid" id="vocab-grid"></div>
    </div>
  </div>

  <div id="detail-view" class="detail-view">
    <div class="content">
      <div class="detail-back" onclick="closeDetail()">← Quay lại</div>
      <div class="detail-card" id="detail-content"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- VOCAB MODAL -->
<div class="modal-overlay" id="vocab-modal" style="display:none" onclick="handleOverlayClick(event,'vocab-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Thêm từ mới</div>
      <button class="close-btn" onclick="closeModal('vocab-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id"/>
      <div class="form-group">
        <label class="form-label">Từ vựng *</label>
        <input type="text" class="form-input" id="input-word" placeholder="e.g. Serendipity"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phiên âm</label>
        <input type="text" class="form-input" id="input-phonetic" placeholder="e.g. /ˌsɛrənˈdɪpɪti/"/>
      </div>
      <div class="form-group">
        <label class="form-label">Nghĩa *</label>
        <textarea class="form-textarea" id="input-meaning" placeholder="Nhập nghĩa..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Ví dụ</label>
        <textarea class="form-textarea" id="input-example" placeholder="Câu ví dụ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Nhóm</label>
        <select class="form-select" id="input-group" onchange="updateSubgroupSelect()">
          <option value="">— Không có nhóm —</option>
        </select>
      </div>
      <div class="form-group" id="subgroup-form-group" style="display:none">
        <label class="form-label">Nhóm nhỏ</label>
        <select class="form-select" id="input-subgroup">
          <option value="">— Không có nhóm nhỏ —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Ảnh minh họa</label>
        <div class="img-upload-zone" id="upload-zone"
          ondrop="handleDrop(event)" ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          onclick="document.getElementById('img-input').click()">
          <input type="file" id="img-input" accept="image/*" onchange="handleImgSelect(event)"/>
          <div style="font-size:24px;margin-bottom:6px">🖼️</div>
          <div style="font-size:13px;color:var(--text)">Kéo thả hoặc click để chọn ảnh</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px">JPG, PNG — tối đa 5MB</div>
          <img class="upload-preview" id="img-preview" src=""/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('vocab-modal')">Hủy</button>
      <button class="btn-primary" onclick="saveVocab()">💾 Lưu</button>
    </div>
  </div>
</div>

<!-- GROUP / SUBGROUP MODAL -->
<div class="modal-overlay" id="group-modal" style="display:none" onclick="handleOverlayClick(event,'group-modal')">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title" id="group-modal-title">Tạo nhóm mới</div>
      <button class="close-btn" onclick="closeModal('group-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="group-parent-id"/>
      <div class="form-group">
        <label class="form-label" id="group-name-label">Tên nhóm *</label>
        <input type="text" class="form-input" id="group-name" placeholder="e.g. Bài 1 - Chào hỏi"/>
      </div>
      <div class="form-group">
        <label class="form-label">Màu</label>
        <div class="color-options" id="color-options"></div>
      </div>
      <div class="form-group" id="emoji-row">
        <label class="form-label">Emoji</label>
        <input type="text" class="form-input" id="group-emoji" placeholder="📚" maxlength="4" style="font-size:20px;text-align:center"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('group-modal')">Hủy</button>
      <button class="btn-primary" onclick="saveGroup()">✅ Tạo</button>
    </div>
  </div>
</div>

<script>
// ===== DB =====
let db;
function initDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open('LexiVault3', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('vocab')) {
        const s = d.createObjectStore('vocab',{keyPath:'id',autoIncrement:true});
        s.createIndex('group','group',{unique:false});
        s.createIndex('subgroup','subgroup',{unique:false});
      }
      if (!d.objectStoreNames.contains('groups')) d.createObjectStore('groups',{keyPath:'id',autoIncrement:true});
      if (!d.objectStoreNames.contains('subgroups')) d.createObjectStore('subgroups',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess = e => { db=e.target.result; res(); };
    req.onerror = () => rej(req.error);
  });
}
const dbGetAll = s => new Promise((res,rej) => { const r=db.transaction(s,'readonly').objectStore(s).getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });
const dbAdd = (s,d) => new Promise((res,rej) => { const r=db.transaction(s,'readwrite').objectStore(s).add(d); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });
const dbPut = (s,d) => new Promise((res,rej) => { const r=db.transaction(s,'readwrite').objectStore(s).put(d); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });
const dbDelete = (s,id) => new Promise((res,rej) => { const r=db.transaction(s,'readwrite').objectStore(s).delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });

// ===== STATE =====
let allVocab=[], allGroups=[], allSubgroups=[];
let currentView='all', currentGroupId=null, currentSubgroupId=null;
let expandedGroups=new Set();
let selectedColor='#4f46e5';
let editingImgBase64=null, editingVocabId=null;

const COLORS=['#4f46e5','#059669','#db2777','#d97706','#0891b2','#7c3aed','#16a34a','#dc2626','#0284c7','#c2410c'];

// ===== INIT =====
async function init() {
  await initDB();
  allVocab=await dbGetAll('vocab');
  allGroups=await dbGetAll('groups');
  allSubgroups=await dbGetAll('subgroups');
  await seedDemo();
  renderAll();
}

async function seedDemo() {
  if (allVocab.length>0) return;
  const gs=[{name:'IELTS',color:'#4f46e5',emoji:'📝'},{name:'Giao tiếp',color:'#059669',emoji:'💬'},{name:'Tiếng Nhật',color:'#db2777',emoji:'🇯🇵'}];
  for(const g of gs){const id=await dbAdd('groups',g);allGroups.push({...g,id});}
  const jpId=allGroups[2].id;
  expandedGroups.add(jpId);
  const sgs=[{name:'Bài 1 – Chào hỏi',color:'#db2777',parentId:jpId},{name:'Bài 2 – Số đếm',color:'#f472b6',parentId:jpId},{name:'Bài 3 – Màu sắc',color:'#9333ea',parentId:jpId}];
  for(const s of sgs){const id=await dbAdd('subgroups',s);allSubgroups.push({...s,id});}
  const demos=[
    {word:'Serendipity',phonetic:'/ˌsɛrənˈdɪpɪti/',meaning:'Sự tình cờ may mắn',example:'Finding that café was pure serendipity.',group:allGroups[0].id,subgroup:null,img:null,createdAt:Date.now()-86400000},
    {word:'Ephemeral',phonetic:'/ɪˈfɛm.ər.əl/',meaning:'Thoáng qua, không lâu dài',example:'The ephemeral beauty of cherry blossoms.',group:allGroups[0].id,subgroup:null,img:null,createdAt:Date.now()-3600000},
    {word:'Resilience',phonetic:'/rɪˈzɪl.i.əns/',meaning:'Khả năng phục hồi sau khó khăn',example:'Her resilience inspired the team.',group:allGroups[1].id,subgroup:null,img:null,createdAt:Date.now()},
    {word:'こんにちは',phonetic:'/ko-n-ni-chi-wa/',meaning:'Xin chào (buổi trưa/chiều)',example:'こんにちは、田中さん！',group:jpId,subgroup:allSubgroups[0].id,img:null,createdAt:Date.now()-7200000},
    {word:'ありがとう',phonetic:'/a-ri-ga-to-u/',meaning:'Cảm ơn',example:'ありがとうございます！',group:jpId,subgroup:allSubgroups[0].id,img:null,createdAt:Date.now()-5000000},
    {word:'いち・に・さん',phonetic:'/i-chi, ni, sa-n/',meaning:'Một, hai, ba',example:'いち、に、さん、し、ご…',group:jpId,subgroup:allSubgroups[1].id,img:null,createdAt:Date.now()-1800000},
    {word:'あか・あお・きいろ',phonetic:'/a-ka, a-o, ki-i-ro/',meaning:'Đỏ, Xanh, Vàng',example:'このりんごはあかです。',group:jpId,subgroup:allSubgroups[2].id,img:null,createdAt:Date.now()-900000},
  ];
  for(const d of demos){const id=await dbAdd('vocab',d);allVocab.push({...d,id});}
}

// ===== RENDER =====
function renderAll() {
  renderStats(); renderSidebarGroups(); renderFilterBar(); renderSubgroupsPanel(); renderVocabGrid();
}

function renderStats() {
  document.getElementById('stat-total').textContent=allVocab.length;
  document.getElementById('stat-groups').textContent=allGroups.length;
  const t=new Date();t.setHours(0,0,0,0);
  document.getElementById('stat-today').textContent=allVocab.filter(v=>v.createdAt>=t.getTime()).length;
}

function renderSidebarGroups() {
  const c=document.getElementById('group-list');
  c.innerHTML=allGroups.map(g=>{
    const subs=allSubgroups.filter(s=>s.parentId===g.id);
    const total=allVocab.filter(v=>v.group===g.id).length;
    const isExp=expandedGroups.has(g.id);
    const isAct=currentGroupId===g.id&&currentSubgroupId===null;
    const subRows=subs.map(s=>{
      const cnt=allVocab.filter(v=>v.subgroup===s.id).length;
      return `<div class="subgroup-row ${currentSubgroupId===s.id?'active':''}" onclick="filterBySubgroup(${g.id},${s.id})">
        <span class="sub-dot" style="background:${s.color||g.color}"></span>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</span>
        <span class="sub-count">${cnt}</span>
        <button class="del-sub-btn" onclick="event.stopPropagation();deleteSubgroup(${s.id})">✕</button>
      </div>`;
    }).join('');
    return `<div>
      <div class="group-parent-row ${isAct?'active':''}" onclick="filterByGroup(${g.id})">
        <span class="group-dot" style="background:${g.color}"></span>
        <span class="group-name-text">${g.emoji||'📁'} ${g.name}</span>
        <span class="group-count-badge">${total}</span>
        <button class="add-sub-btn" onclick="event.stopPropagation();openSubgroupModal(${g.id})" title="＋ Nhóm nhỏ">＋</button>
        ${subs.length?`<button class="expand-btn ${isExp?'open':''}" onclick="event.stopPropagation();toggleExpand(${g.id})">▶</button>`:'<span style="width:20px;flex-shrink:0"></span>'}
      </div>
      <div class="subgroup-container ${isExp?'open':''}">${subRows}</div>
    </div>`;
  }).join('');
}

function toggleExpand(gid) {
  expandedGroups.has(gid)?expandedGroups.delete(gid):expandedGroups.add(gid);
  renderSidebarGroups();
}

function renderFilterBar() {
  const bar=document.getElementById('filter-bar');
  if (!currentGroupId){bar.innerHTML='';return;}
  const subs=allSubgroups.filter(s=>s.parentId===currentGroupId);
  if(!subs.length){bar.innerHTML='';return;}
  const group=allGroups.find(g=>g.id===currentGroupId);
  bar.innerHTML=`<button class="filter-chip ${!currentSubgroupId?'active':''}" onclick="filterByGroup(${currentGroupId})">Tất cả</button>`+
    subs.map(s=>`<button class="filter-chip ${currentSubgroupId===s.id?'active':''}" onclick="filterBySubgroup(${currentGroupId},${s.id})"
      style="${currentSubgroupId===s.id?`background:${s.color||group?.color};border-color:${s.color||group?.color};color:#fff`:''}">${s.name}</button>`).join('');
}

function renderSubgroupsPanel() {
  const panel=document.getElementById('subgroups-panel');
  if (!currentGroupId||currentSubgroupId!==null){panel.style.display='none';return;}
  const subs=allSubgroups.filter(s=>s.parentId===currentGroupId);
  panel.style.display='block';
  document.getElementById('subgroups-grid').innerHTML=
    subs.map(s=>{
      const cnt=allVocab.filter(v=>v.subgroup===s.id).length;
      return `<div class="subgroup-card" onclick="filterBySubgroup(${currentGroupId},${s.id})">
        <div class="subgroup-card-top">
          <span class="subgroup-card-dot" style="background:${s.color}"></span>
          <span class="subgroup-card-name">${s.name}</span>
        </div>
        <div class="subgroup-card-count">${cnt} từ</div>
        <button class="subgroup-card-del" onclick="event.stopPropagation();deleteSubgroup(${s.id})">✕</button>
      </div>`;
    }).join('')+
    `<div class="add-subgroup-card" onclick="openSubgroupModal(${currentGroupId})">＋ Thêm nhóm nhỏ</div>`;
}

function renderVocabGrid() {
  const grid=document.getElementById('vocab-grid');
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  let list=[...allVocab];
  if(currentView==='recent') list=list.sort((a,b)=>b.createdAt-a.createdAt).slice(0,20);
  if(currentGroupId) list=list.filter(v=>v.group===currentGroupId);
  if(currentSubgroupId) list=list.filter(v=>v.subgroup===currentSubgroupId);
  if(q) list=list.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));
  if(!list.length){grid.innerHTML=`<div class="empty-state"><div class="emoji">📭</div><h3>Chưa có từ vựng</h3><p>Bấm "Thêm từ mới" để bắt đầu!</p></div>`;return;}
  grid.innerHTML=list.map((v,i)=>{
    const group=allGroups.find(g=>g.id===v.group);
    const sub=allSubgroups.find(s=>s.id===v.subgroup);
    const img=v.img?`<img class="vocab-img" src="${v.img}" alt="${v.word}" loading="lazy"/>`:`<div class="vocab-img-placeholder">📝</div>`;
    const tag=sub
      ?`<span class="vocab-group-tag" style="background:${sub.color}22;color:${sub.color}">📂 ${sub.name}</span>`
      :group
        ?`<span class="vocab-group-tag" style="background:${group.color}22;color:${group.color}">${group.emoji||'📁'} ${group.name}</span>`
        :`<span class="vocab-group-tag" style="background:var(--surface2);color:var(--text2)">Chưa phân nhóm</span>`;
    return `<div class="vocab-card" style="animation-delay:${i*0.035}s" onclick="openDetail(${v.id})">
      ${img}
      <div class="vocab-body">
        <div class="vocab-word">${v.word}</div>
        ${v.phonetic?`<div class="vocab-phonetic">${v.phonetic}</div>`:''}
        <div class="vocab-meaning">${v.meaning.length>80?v.meaning.slice(0,80)+'…':v.meaning}</div>
      </div>
      <div class="vocab-footer">${tag}
        <div class="vocab-actions" onclick="event.stopPropagation()">
          <button class="icon-btn edit" onclick="openEditModal(${v.id})">✏️</button>
          <button class="icon-btn" onclick="deleteVocab(${v.id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== NAV =====
function showView(view) {
  currentView=view;currentGroupId=null;currentSubgroupId=null;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(view==='recent'?'nav-recent':'nav-all')?.classList.add('active');
  document.getElementById('page-title').textContent=view==='recent'?'Gần đây nhất':'Tất cả từ vựng';
  document.getElementById('breadcrumb').style.display='none';
  document.getElementById('list-view').style.display='block';
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('stats-row').style.display=view==='all'?'grid':'none';
  renderAll();
}

function filterByGroup(gid) {
  currentGroupId=gid;currentSubgroupId=null;currentView='filtered';
  if(gid) expandedGroups.add(gid);
  const g=allGroups.find(x=>x.id===gid);
  document.getElementById('page-title').textContent=g?`${g.emoji||'📁'} ${g.name}`:'Tất cả';
  document.getElementById('breadcrumb').style.display='none';
  document.getElementById('stats-row').style.display='none';
  document.getElementById('list-view').style.display='block';
  document.getElementById('detail-view').classList.remove('show');
  renderAll();
}

function filterBySubgroup(gid,sid) {
  currentGroupId=gid;currentSubgroupId=sid;currentView='filtered';
  const g=allGroups.find(x=>x.id===gid);
  const s=allSubgroups.find(x=>x.id===sid);
  document.getElementById('page-title').textContent=s?.name||'';
  const bc=document.getElementById('breadcrumb');
  bc.style.display='flex';
  bc.innerHTML=`<span onclick="showView('all')">Tất cả</span> ›
    <span onclick="filterByGroup(${gid})" style="color:${g?.color}">${g?.emoji||'📁'} ${g?.name}</span> ›
    <span style="color:${s?.color}">📂 ${s?.name}</span>`;
  document.getElementById('stats-row').style.display='none';
  document.getElementById('list-view').style.display='block';
  document.getElementById('detail-view').classList.remove('show');
  renderAll();
}

// ===== DETAIL =====
function openDetail(id) {
  const v=allVocab.find(x=>x.id===id);if(!v)return;
  const g=allGroups.find(x=>x.id===v.group);
  const s=allSubgroups.find(x=>x.id===v.subgroup);
  document.getElementById('detail-content').innerHTML=`
    ${v.img?`<img class="detail-img" src="${v.img}" alt="${v.word}"/>`:''}
    <div class="detail-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        ${g?`<span style="background:${g.color}22;color:${g.color};padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500">${g.emoji||'📁'} ${g.name}</span>`:''}
        ${s?`<span style="background:${s.color}22;color:${s.color};padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500">📂 ${s.name}</span>`:''}
      </div>
      <div class="detail-word">${v.word}</div>
      ${v.phonetic?`<div class="detail-phonetic">${v.phonetic}</div>`:''}
      <div class="detail-meaning">${v.meaning}</div>
      ${v.example?`<div class="detail-example">${v.example}</div>`:''}
      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn-primary" onclick="openEditModal(${v.id})">✏️ Chỉnh sửa</button>
        <button class="btn-secondary" onclick="deleteVocab(${v.id})">🗑️ Xóa</button>
      </div>
    </div>`;
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').classList.add('show');
}
function closeDetail(){document.getElementById('list-view').style.display='block';document.getElementById('detail-view').classList.remove('show');}

// ===== VOCAB MODAL =====
function openAddModal(){
  editingVocabId=null;editingImgBase64=null;
  document.getElementById('modal-title').textContent='Thêm từ mới';
  ['edit-id','input-word','input-phonetic','input-meaning','input-example'].forEach(id=>document.getElementById(id).value='');
  const p=document.getElementById('img-preview');p.className='upload-preview';p.src='';
  populateGroupSelect(currentGroupId,currentSubgroupId);
  document.getElementById('vocab-modal').style.display='flex';
}
function openEditModal(id){
  const v=allVocab.find(x=>x.id===id);if(!v)return;
  editingVocabId=id;editingImgBase64=v.img||null;
  document.getElementById('modal-title').textContent='Chỉnh sửa từ vựng';
  document.getElementById('edit-id').value=id;
  document.getElementById('input-word').value=v.word;
  document.getElementById('input-phonetic').value=v.phonetic||'';
  document.getElementById('input-meaning').value=v.meaning;
  document.getElementById('input-example').value=v.example||'';
  const p=document.getElementById('img-preview');
  if(v.img){p.src=v.img;p.className='upload-preview show';}else{p.className='upload-preview';}
  populateGroupSelect(v.group,v.subgroup);
  document.getElementById('vocab-modal').style.display='flex';
}
function populateGroupSelect(selG=null,selS=null){
  document.getElementById('input-group').innerHTML=`<option value="">— Không có nhóm —</option>`+
    allGroups.map(g=>`<option value="${g.id}" ${selG===g.id?'selected':''}>${g.emoji||'📁'} ${g.name}</option>`).join('');
  updateSubgroupSelect(selS);
}
function updateSubgroupSelect(pre=null){
  const gid=parseInt(document.getElementById('input-group').value)||null;
  const sg=document.getElementById('subgroup-form-group');
  if(!gid){sg.style.display='none';return;}
  const subs=allSubgroups.filter(s=>s.parentId===gid);
  if(!subs.length){sg.style.display='none';return;}
  sg.style.display='block';
  document.getElementById('input-subgroup').innerHTML=`<option value="">— Không có nhóm nhỏ —</option>`+
    subs.map(s=>`<option value="${s.id}" ${pre===s.id?'selected':''}>${s.name}</option>`).join('');
}
async function saveVocab(){
  const word=document.getElementById('input-word').value.trim();
  const meaning=document.getElementById('input-meaning').value.trim();
  if(!word||!meaning){showToast('Vui lòng nhập từ và nghĩa!','error');return;}
  const data={
    word,meaning,
    phonetic:document.getElementById('input-phonetic').value.trim(),
    example:document.getElementById('input-example').value.trim(),
    group:parseInt(document.getElementById('input-group').value)||null,
    subgroup:parseInt(document.getElementById('input-subgroup').value)||null,
    img:editingImgBase64,createdAt:Date.now(),
  };
  if(editingVocabId){
    data.id=editingVocabId;data.createdAt=allVocab.find(v=>v.id===editingVocabId)?.createdAt||Date.now();
    await dbPut('vocab',data);allVocab[allVocab.findIndex(v=>v.id===editingVocabId)]=data;
    showToast('Đã cập nhật! ✨','success');
  }else{
    const id=await dbAdd('vocab',data);allVocab.push({...data,id});
    showToast('Đã thêm từ mới! 🎉','success');
  }
  closeModal('vocab-modal');renderAll();
}
async function deleteVocab(id){
  if(!confirm('Xóa từ này?'))return;
  await dbDelete('vocab',id);allVocab=allVocab.filter(v=>v.id!==id);
  closeDetail();showToast('Đã xóa','info');renderAll();
}

// ===== IMAGE =====
function handleImgSelect(e){const f=e.target.files[0];if(f)processImg(f);}
function handleDrop(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))processImg(f);}
function processImg(file){
  if(file.size>5*1024*1024){showToast('Ảnh quá lớn! Max 5MB','error');return;}
  const r=new FileReader();
  r.onload=e=>{editingImgBase64=e.target.result;const p=document.getElementById('img-preview');p.src=editingImgBase64;p.className='upload-preview show';};
  r.readAsDataURL(file);
}

// ===== GROUP MODAL =====
function openGroupModal(){
  document.getElementById('group-modal-title').textContent='Tạo nhóm mới';
  document.getElementById('group-parent-id').value='';
  document.getElementById('group-name').value='';
  document.getElementById('group-emoji').value='📚';
  document.getElementById('emoji-row').style.display='block';
  document.getElementById('group-name-label').textContent='Tên nhóm *';
  selectedColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  renderColorOptions();
  document.getElementById('group-modal').style.display='flex';
}
function openSubgroupModal(pid){
  const parent=allGroups.find(g=>g.id===pid);
  document.getElementById('group-modal-title').textContent=`Thêm nhóm nhỏ vào "${parent?.name||''}"`;
  document.getElementById('group-parent-id').value=pid;
  document.getElementById('group-name').value='';
  document.getElementById('group-emoji').value='';
  document.getElementById('emoji-row').style.display='none';
  document.getElementById('group-name-label').textContent='Tên nhóm nhỏ *';
  selectedColor=parent?.color||COLORS[0];
  renderColorOptions();
  document.getElementById('group-modal').style.display='flex';
}
function renderColorOptions(){
  document.getElementById('color-options').innerHTML=COLORS.map(c=>
    `<div class="color-opt ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
}
function selectColor(c){selectedColor=c;renderColorOptions();}
async function saveGroup(){
  const name=document.getElementById('group-name').value.trim();
  if(!name){showToast('Nhập tên nhóm!','error');return;}
  const pid=parseInt(document.getElementById('group-parent-id').value)||null;
  if(pid){
    const data={name,color:selectedColor,parentId:pid};
    const id=await dbAdd('subgroups',data);allSubgroups.push({...data,id});
    expandedGroups.add(pid);
    showToast(`Đã tạo nhóm nhỏ "${name}"! 🎊`,'success');
  }else{
    const data={name,color:selectedColor,emoji:document.getElementById('group-emoji').value.trim()||'📁'};
    const id=await dbAdd('groups',data);allGroups.push({...data,id});
    showToast(`Đã tạo nhóm "${name}"! 🎊`,'success');
  }
  closeModal('group-modal');renderAll();
}
async function deleteSubgroup(id){
  if(!confirm('Xóa nhóm nhỏ này?\n(Các từ trong nhóm vẫn còn, chỉ bỏ gán nhóm nhỏ)'))return;
  await dbDelete('subgroups',id);
  const affected=allVocab.filter(v=>v.subgroup===id);
  for(const v of affected){v.subgroup=null;await dbPut('vocab',v);}
  allSubgroups=allSubgroups.filter(s=>s.id!==id);
  if(currentSubgroupId===id)currentSubgroupId=null;
  showToast('Đã xóa nhóm nhỏ','info');renderAll();
}

// ===== UTILS =====
function closeModal(id){document.getElementById(id).style.display='none';}
function handleOverlayClick(e,id){if(e.target.id===id)closeModal(id);}
function showToast(msg,type='info'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${{success:'✅',error:'❌',info:'ℹ️'}[type]}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='slideInR 0.3s ease reverse';setTimeout(()=>t.remove(),300);},3000);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal('vocab-modal');closeModal('group-modal');}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-input').focus();}
});

init();
</script>
