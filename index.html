<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexiVault — Kho Từ Vựng</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef1f8;
    --border: #dde2f0;
    --accent: #059669;
    --accent2: #4f46e5;
    --accent3: #db2777;
    --text: #1e2235;
    --text2: #64748b;
    --danger: #ef4444;
    --card-radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    padding: 28px 0;
  }

  .logo {
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
  }

  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .nav-section {
    padding: 20px 16px 8px;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    margin: 0 8px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    color: var(--text2);
    transition: all 0.2s;
    user-select: none;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(79,70,229,0.1); color: var(--accent2); font-weight: 500; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  /* GROUPS LIST IN SIDEBAR */
  .group-list { flex: 1; overflow-y: auto; padding-bottom: 16px; }
  .group-list::-webkit-scrollbar { width: 4px; }
  .group-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .group-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    margin: 2px 8px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.2s;
  }

  .group-nav-item:hover { background: var(--surface2); color: var(--text); }
  .group-nav-item.active { background: rgba(129,140,248,0.12); color: var(--accent2); }

  .group-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .group-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    border-radius: 20px;
    padding: 1px 7px;
  }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .add-group-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .add-group-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(129,140,248,0.05); }

  /* MAIN */
  .main {
    margin-left: 260px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .topbar {
    position: sticky;
    top: 0;
    background: rgba(244,246,251,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 36px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 50;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    flex: 1;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 16px;
    width: 300px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within { border-color: var(--accent2); }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--text2); }

  .btn-primary {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent2), #6366f1);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,70,229,0.3); }

  /* CONTENT */
  .content { padding: 32px 36px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: attr(data-icon);
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    opacity: 0.07;
  }

  .stat-label { font-size: 12px; color: var(--text2); letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .filter-chip:hover { border-color: var(--text2); color: var(--text); }
  .filter-chip.active { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: 500; }

  /* VOCAB GRID */
  .vocab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .vocab-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    animation: fadeUp 0.3s ease both;
    position: relative;
    group: true;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .vocab-card:hover {
    border-color: var(--accent2);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(79,70,229,0.12);
  }

  .vocab-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .vocab-img-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--surface2), var(--border));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--text2);
  }

  .vocab-body { padding: 14px 16px; }

  .vocab-word {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: -0.3px;
  }

  .vocab-phonetic { font-size: 12px; color: var(--accent); margin-bottom: 6px; }

  .vocab-meaning { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .vocab-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
  }

  .vocab-group-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
    flex: 1;
  }

  .vocab-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .vocab-card:hover .vocab-actions { opacity: 1; }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
  }

  .icon-btn:hover { border-color: var(--danger); color: var(--danger); }
  .icon-btn.edit:hover { border-color: var(--accent2); color: var(--accent2); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text2);
  }

  .empty-state .emoji { font-size: 64px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,34,53,0.6);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .close-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .close-btn:hover { background: var(--surface2); color: var(--text); }

  .modal-body { padding: 24px 28px; }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 11px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent2); }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: vertical; min-height: 80px; }

  /* IMAGE UPLOAD */
  .img-upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .img-upload-zone:hover { border-color: var(--accent2); background: rgba(129,140,248,0.04); }
  .img-upload-zone.drag-over { border-color: var(--accent); background: rgba(110,231,183,0.06); }
  .img-upload-zone input { display: none; }

  .upload-preview {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .upload-preview.show { display: block; }

  .upload-hint { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }

  /* COLOR PICKER */
  .color-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-opt {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }

  .color-opt:hover { transform: scale(1.15); }
  .color-opt.selected { border-color: var(--text); transform: scale(1.1); }

  .modal-footer {
    padding: 20px 28px 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-secondary {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
    min-width: 240px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent2); }

  /* DETAIL VIEW */
  .detail-view {
    display: none;
    padding: 32px 36px;
  }

  .detail-view.show { display: block; }

  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 28px;
    transition: color 0.2s;
  }

  .detail-back:hover { color: var(--text); }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    max-width: 680px;
  }

  .detail-img {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    display: block;
  }

  .detail-body { padding: 32px; }
  .detail-word { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  .detail-phonetic { font-size: 16px; color: var(--accent); margin-bottom: 16px; }
  .detail-meaning { font-size: 16px; line-height: 1.7; color: var(--text2); margin-bottom: 20px; }
  .detail-example { font-size: 14px; font-style: italic; color: var(--text2); padding: 14px 18px; background: var(--surface2); border-radius: 10px; border-left: 3px solid var(--accent2); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { width: 60px; }
    .sidebar .logo span, .sidebar .nav-item span, .nav-section, .group-nav-item span, .group-count, .sidebar-footer { display: none; }
    .sidebar .logo h1 { font-size: 18px; text-align: center; }
    .nav-item { justify-content: center; padding: 12px; }
    .group-nav-item { justify-content: center; padding: 10px; }
    .main { margin-left: 60px; }
    .topbar, .content { padding: 16px 20px; }
    .stats-row { grid-template-columns: 1fr; }
    .search-box { width: 180px; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <h1>LexiVault</h1>
    <span>Kho Từ Vựng</span>
  </div>

  <div class="nav-section">Menu</div>
  <div class="nav-item active" onclick="showView('all')" id="nav-all">
    <span class="icon">📚</span> <span>Tất cả từ</span>
  </div>
  <div class="nav-item" onclick="showView('groups')" id="nav-groups">
    <span class="icon">🗂️</span> <span>Nhóm từ</span>
  </div>
  <div class="nav-item" onclick="showView('recent')" id="nav-recent">
    <span class="icon">🕐</span> <span>Gần đây</span>
  </div>

  <div class="nav-section">Nhóm của tôi</div>
  <div class="group-list" id="group-list"></div>

  <div class="sidebar-footer">
    <button class="add-group-btn" onclick="openGroupModal()">
      <span>＋</span> <span>Thêm nhóm</span>
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="page-title" id="page-title">Tất cả từ vựng</div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Tìm từ vựng..." id="search-input" oninput="handleSearch()" />
    </div>
    <button class="btn-primary" onclick="openAddModal()">
      ＋ Thêm từ mới
    </button>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="content">
      <!-- STATS -->
      <div class="stats-row" id="stats-row">
        <div class="stat-card" data-icon="📖">
          <div class="stat-label">Tổng từ vựng</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card" data-icon="🗂️">
          <div class="stat-label">Số nhóm</div>
          <div class="stat-value" id="stat-groups">0</div>
        </div>
        <div class="stat-card" data-icon="📅">
          <div class="stat-label">Thêm hôm nay</div>
          <div class="stat-value" id="stat-today">0</div>
        </div>
      </div>

      <!-- FILTER -->
      <div class="filter-bar" id="filter-bar"></div>

      <!-- GRID -->
      <div class="vocab-grid" id="vocab-grid"></div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view" class="detail-view">
    <div class="content">
      <div class="detail-back" onclick="closeDetail()">← Quay lại</div>
      <div class="detail-card" id="detail-content"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- ADD/EDIT VOCAB MODAL -->
<div class="modal-overlay" id="vocab-modal" style="display:none" onclick="handleOverlayClick(event,'vocab-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Thêm từ mới</div>
      <button class="close-btn" onclick="closeModal('vocab-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label class="form-label">Từ vựng *</label>
        <input type="text" class="form-input" id="input-word" placeholder="e.g. Serendipity" />
      </div>
      <div class="form-group">
        <label class="form-label">Phiên âm</label>
        <input type="text" class="form-input" id="input-phonetic" placeholder="e.g. /ˌsɛrənˈdɪpɪti/" />
      </div>
      <div class="form-group">
        <label class="form-label">Nghĩa *</label>
        <textarea class="form-textarea" id="input-meaning" placeholder="Nhập nghĩa của từ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Ví dụ</label>
        <textarea class="form-textarea" id="input-example" placeholder="Câu ví dụ sử dụng từ này..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Nhóm</label>
        <select class="form-select" id="input-group">
          <option value="">— Không có nhóm —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Ảnh minh họa</label>
        <div class="img-upload-zone" id="upload-zone"
          ondrop="handleDrop(event)" ondragover="event.preventDefault(); this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          onclick="document.getElementById('img-input').click()">
          <input type="file" id="img-input" accept="image/*" onchange="handleImgSelect(event)" />
          <div class="upload-icon">🖼️</div>
          <div style="font-size:13px; color:var(--text)">Kéo thả hoặc click để chọn ảnh</div>
          <div class="upload-hint">JPG, PNG, GIF — tối đa 5MB</div>
          <img class="upload-preview" id="img-preview" src="" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('vocab-modal')">Hủy</button>
      <button class="btn-primary" onclick="saveVocab()">💾 Lưu từ vựng</button>
    </div>
  </div>
</div>

<!-- ADD GROUP MODAL -->
<div class="modal-overlay" id="group-modal" style="display:none" onclick="handleOverlayClick(event,'group-modal')">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">Tạo nhóm mới</div>
      <button class="close-btn" onclick="closeModal('group-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Tên nhóm *</label>
        <input type="text" class="form-input" id="group-name" placeholder="e.g. IELTS Academic, Business..." />
      </div>
      <div class="form-group">
        <label class="form-label">Màu nhóm</label>
        <div class="color-options" id="color-options"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Emoji</label>
        <input type="text" class="form-input" id="group-emoji" placeholder="🌟" maxlength="4" style="font-size:20px; text-align:center" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('group-modal')">Hủy</button>
      <button class="btn-primary" onclick="saveGroup()">✅ Tạo nhóm</button>
    </div>
  </div>
</div>

<script>
// ===== DATABASE (IndexedDB) =====
let db;
const DB_NAME = 'LexiVaultDB';
const DB_VERSION = 1;

function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('vocab')) {
        const vocabStore = database.createObjectStore('vocab', { keyPath: 'id', autoIncrement: true });
        vocabStore.createIndex('group', 'group', { unique: false });
        vocabStore.createIndex('createdAt', 'createdAt', { unique: false });
      }
      if (!database.objectStoreNames.contains('groups')) {
        database.createObjectStore('groups', { keyPath: 'id', autoIncrement: true });
      }
    };
    request.onsuccess = (e) => { db = e.target.result; resolve(); };
    request.onerror = () => reject(request.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbAdd(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ===== STATE =====
let allVocab = [];
let allGroups = [];
let currentView = 'all';
let currentGroupFilter = null;
let selectedColor = '#818cf8';
let editingImgBase64 = null;
let editingVocabId = null;

// ===== COLORS =====
const GROUP_COLORS = [
  '#6ee7b7','#818cf8','#f472b6','#fbbf24','#60a5fa',
  '#a78bfa','#34d399','#f87171','#38bdf8','#fb923c'
];

// ===== INIT =====
async function init() {
  await initDB();
  allVocab = await dbGetAll('vocab');
  allGroups = await dbGetAll('groups');
  renderAll();
  seedDemo();
}

async function seedDemo() {
  if (allVocab.length > 0) return;
  const demoGroups = [
    { name: 'IELTS', color: '#818cf8', emoji: '📝' },
    { name: 'Giao tiếp', color: '#6ee7b7', emoji: '💬' },
    { name: 'Kinh doanh', color: '#fbbf24', emoji: '💼' },
  ];
  for (const g of demoGroups) {
    const id = await dbAdd('groups', g);
    allGroups.push({ ...g, id });
  }
  const demos = [
    { word: 'Serendipity', phonetic: '/ˌsɛrənˈdɪpɪti/', meaning: 'Sự tình cờ may mắn — khi bạn tìm thấy điều tốt đẹp mà không ngờ tới', example: 'Finding that bookstore was pure serendipity.', group: allGroups[0].id, createdAt: Date.now() - 86400000, img: null },
    { word: 'Ephemeral', phonetic: '/ɪˈfɛm.ər.əl/', meaning: 'Thoáng qua, không lâu dài; chỉ tồn tại trong thời gian ngắn', example: 'The ephemeral beauty of cherry blossoms.', group: allGroups[0].id, createdAt: Date.now() - 3600000, img: null },
    { word: 'Ubiquitous', phonetic: '/juːˈbɪk.wɪ.təs/', meaning: 'Hiện diện khắp nơi, phổ biến ở mọi chỗ', example: 'Smartphones are ubiquitous in modern life.', group: allGroups[2].id, createdAt: Date.now() - 7200000, img: null },
    { word: 'Resilience', phonetic: '/rɪˈzɪl.i.əns/', meaning: 'Khả năng phục hồi, sức bật sau khó khăn', example: 'Her resilience inspired the whole team.', group: allGroups[1].id, createdAt: Date.now(), img: null },
  ];
  for (const d of demos) {
    const id = await dbAdd('vocab', d);
    allVocab.push({ ...d, id });
  }
  renderAll();
}

// ===== RENDER =====
function renderAll() {
  renderStats();
  renderSidebarGroups();
  renderFilterBar();
  renderVocabGrid();
}

function renderStats() {
  document.getElementById('stat-total').textContent = allVocab.length;
  document.getElementById('stat-groups').textContent = allGroups.length;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayCount = allVocab.filter(v => v.createdAt >= today.getTime()).length;
  document.getElementById('stat-today').textContent = todayCount;
}

function renderSidebarGroups() {
  const container = document.getElementById('group-list');
  container.innerHTML = allGroups.map(g => {
    const count = allVocab.filter(v => v.group === g.id).length;
    const isActive = currentGroupFilter === g.id;
    return `<div class="group-nav-item ${isActive ? 'active' : ''}" onclick="filterByGroup(${g.id})">
      <span class="group-dot" style="background:${g.color}"></span>
      <span>${g.emoji || '📁'} ${g.name}</span>
      <span class="group-count">${count}</span>
    </div>`;
  }).join('');
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-chip ${!currentGroupFilter && currentView === 'all' ? 'active' : ''}" onclick="filterByGroup(null)">Tất cả</button>` +
    allGroups.map(g => `<button class="filter-chip ${currentGroupFilter === g.id ? 'active' : ''}" onclick="filterByGroup(${g.id})" style="${currentGroupFilter === g.id ? `background:${g.color};border-color:${g.color};color:#000` : ''}">
      ${g.emoji || '📁'} ${g.name}
    </button>`).join('');
}

function getFilteredVocab() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let list = [...allVocab];
  if (currentView === 'recent') list = list.sort((a,b) => b.createdAt - a.createdAt).slice(0,20);
  if (currentGroupFilter) list = list.filter(v => v.group === currentGroupFilter);
  if (q) list = list.filter(v => v.word.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q));
  return list;
}

function renderVocabGrid() {
  const grid = document.getElementById('vocab-grid');
  const list = getFilteredVocab();

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="emoji">📭</div>
      <h3>Chưa có từ vựng nào</h3>
      <p>Bấm "Thêm từ mới" để bắt đầu xây dựng kho từ vựng của bạn!</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((v, i) => {
    const group = allGroups.find(g => g.id === v.group);
    const imgHtml = v.img
      ? `<img class="vocab-img" src="${v.img}" alt="${v.word}" loading="lazy" />`
      : `<div class="vocab-img-placeholder">📝</div>`;
    const groupTag = group
      ? `<span class="vocab-group-tag" style="background:${group.color}22; color:${group.color}">${group.emoji || '📁'} ${group.name}</span>`
      : `<span class="vocab-group-tag" style="background:var(--surface2);color:var(--text2)">Chưa phân nhóm</span>`;
    return `<div class="vocab-card" style="animation-delay:${i*0.04}s" onclick="openDetail(${v.id})">
      ${imgHtml}
      <div class="vocab-body">
        <div class="vocab-word">${v.word}</div>
        ${v.phonetic ? `<div class="vocab-phonetic">${v.phonetic}</div>` : ''}
        <div class="vocab-meaning">${v.meaning.length > 80 ? v.meaning.slice(0,80)+'…' : v.meaning}</div>
      </div>
      <div class="vocab-footer">
        ${groupTag}
        <div class="vocab-actions" onclick="event.stopPropagation()">
          <button class="icon-btn edit" onclick="openEditModal(${v.id})" title="Sửa">✏️</button>
          <button class="icon-btn" onclick="deleteVocab(${v.id})" title="Xóa">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== VIEWS =====
function showView(view) {
  currentView = view;
  currentGroupFilter = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`nav-${view === 'groups' ? 'groups' : view === 'recent' ? 'recent' : 'all'}`)?.classList.add('active');

  const titles = { all: 'Tất cả từ vựng', groups: 'Nhóm từ vựng', recent: 'Gần đây nhất' };
  document.getElementById('page-title').textContent = titles[view] || 'Từ vựng';

  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('stats-row').style.display = view === 'all' ? 'grid' : 'none';

  renderFilterBar();
  renderSidebarGroups();
  renderVocabGrid();
}

function filterByGroup(groupId) {
  currentGroupFilter = groupId;
  currentView = groupId ? 'filtered' : 'all';
  const group = allGroups.find(g => g.id === groupId);
  document.getElementById('page-title').textContent = group ? `${group.emoji || '📁'} ${group.name}` : 'Tất cả từ vựng';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('show');
  renderSidebarGroups();
  renderFilterBar();
  renderVocabGrid();
}

function handleSearch() { renderVocabGrid(); }

// ===== DETAIL =====
function openDetail(id) {
  const v = allVocab.find(x => x.id === id);
  if (!v) return;
  const group = allGroups.find(g => g.id === v.group);
  const imgHtml = v.img ? `<img class="detail-img" src="${v.img}" alt="${v.word}" />` : '';
  document.getElementById('detail-content').innerHTML = `
    ${imgHtml}
    <div class="detail-body">
      ${group ? `<span class="vocab-group-tag" style="background:${group.color}22;color:${group.color};padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;display:inline-block;margin-bottom:12px">${group.emoji || '📁'} ${group.name}</span>` : ''}
      <div class="detail-word">${v.word}</div>
      ${v.phonetic ? `<div class="detail-phonetic">${v.phonetic}</div>` : ''}
      <div class="detail-meaning">${v.meaning}</div>
      ${v.example ? `<div class="detail-example">${v.example}</div>` : ''}
      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn-primary" onclick="openEditModal(${v.id})">✏️ Chỉnh sửa</button>
        <button class="btn-secondary" onclick="deleteVocab(${v.id})">🗑️ Xóa</button>
      </div>
    </div>`;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').classList.add('show');
}

function closeDetail() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('show');
}

// ===== VOCAB MODAL =====
function openAddModal() {
  editingVocabId = null;
  editingImgBase64 = null;
  document.getElementById('modal-title').textContent = 'Thêm từ mới';
  document.getElementById('edit-id').value = '';
  document.getElementById('input-word').value = '';
  document.getElementById('input-phonetic').value = '';
  document.getElementById('input-meaning').value = '';
  document.getElementById('input-example').value = '';
  document.getElementById('img-preview').classList.remove('show');
  document.getElementById('img-preview').src = '';
  populateGroupSelect();
  document.getElementById('vocab-modal').style.display = 'flex';
}

function openEditModal(id) {
  const v = allVocab.find(x => x.id === id);
  if (!v) return;
  editingVocabId = id;
  editingImgBase64 = v.img || null;
  document.getElementById('modal-title').textContent = 'Chỉnh sửa từ vựng';
  document.getElementById('edit-id').value = id;
  document.getElementById('input-word').value = v.word;
  document.getElementById('input-phonetic').value = v.phonetic || '';
  document.getElementById('input-meaning').value = v.meaning;
  document.getElementById('input-example').value = v.example || '';
  if (v.img) {
    document.getElementById('img-preview').src = v.img;
    document.getElementById('img-preview').classList.add('show');
  } else {
    document.getElementById('img-preview').classList.remove('show');
  }
  populateGroupSelect(v.group);
  document.getElementById('vocab-modal').style.display = 'flex';
}

function populateGroupSelect(selectedId = null) {
  const sel = document.getElementById('input-group');
  sel.innerHTML = `<option value="">— Không có nhóm —</option>` +
    allGroups.map(g => `<option value="${g.id}" ${selectedId === g.id ? 'selected' : ''}>${g.emoji || '📁'} ${g.name}</option>`).join('');
}

async function saveVocab() {
  const word = document.getElementById('input-word').value.trim();
  const meaning = document.getElementById('input-meaning').value.trim();
  if (!word || !meaning) { showToast('Vui lòng nhập từ vựng và nghĩa!', 'error'); return; }

  const data = {
    word,
    phonetic: document.getElementById('input-phonetic').value.trim(),
    meaning,
    example: document.getElementById('input-example').value.trim(),
    group: parseInt(document.getElementById('input-group').value) || null,
    img: editingImgBase64,
    createdAt: Date.now(),
  };

  if (editingVocabId) {
    data.id = editingVocabId;
    data.createdAt = allVocab.find(v => v.id === editingVocabId)?.createdAt || Date.now();
    await dbPut('vocab', data);
    const idx = allVocab.findIndex(v => v.id === editingVocabId);
    allVocab[idx] = data;
    showToast('Đã cập nhật từ vựng! ✨', 'success');
  } else {
    const id = await dbAdd('vocab', data);
    allVocab.push({ ...data, id });
    showToast('Đã thêm từ vựng mới! 🎉', 'success');
  }

  closeModal('vocab-modal');
  renderAll();
}

async function deleteVocab(id) {
  if (!confirm('Bạn có chắc muốn xóa từ này?')) return;
  await dbDelete('vocab', id);
  allVocab = allVocab.filter(v => v.id !== id);
  closeDetail();
  showToast('Đã xóa từ vựng', 'info');
  renderAll();
}

// ===== IMAGE UPLOAD =====
function handleImgSelect(e) {
  const file = e.target.files[0];
  if (file) processImg(file);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) processImg(file);
}

function processImg(file) {
  if (file.size > 5 * 1024 * 1024) { showToast('Ảnh quá lớn! Tối đa 5MB', 'error'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    editingImgBase64 = e.target.result;
    const preview = document.getElementById('img-preview');
    preview.src = editingImgBase64;
    preview.classList.add('show');
  };
  reader.readAsDataURL(file);
}

// ===== GROUP MODAL =====
function openGroupModal() {
  document.getElementById('group-name').value = '';
  document.getElementById('group-emoji').value = '📚';
  selectedColor = GROUP_COLORS[Math.floor(Math.random() * GROUP_COLORS.length)];
  renderColorOptions();
  document.getElementById('group-modal').style.display = 'flex';
}

function renderColorOptions() {
  document.getElementById('color-options').innerHTML = GROUP_COLORS.map(c =>
    `<div class="color-opt ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c) {
  selectedColor = c;
  renderColorOptions();
}

async function saveGroup() {
  const name = document.getElementById('group-name').value.trim();
  if (!name) { showToast('Vui lòng nhập tên nhóm!', 'error'); return; }
  const data = { name, color: selectedColor, emoji: document.getElementById('group-emoji').value.trim() || '📁' };
  const id = await dbAdd('groups', data);
  allGroups.push({ ...data, id });
  closeModal('group-modal');
  showToast(`Đã tạo nhóm "${name}"! 🎊`, 'success');
  renderAll();
}

// ===== UTILS =====
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function handleOverlayClick(e, id) { if (e.target.id === id) closeModal(id); }

function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal('vocab-modal');
    closeModal('group-modal');
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

// ===== START =====
init();
</script>
</body>
</html>
